<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-card .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-card h1 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 700;
        }

        .login-card p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafafa;
        }

        .input-group input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2c5364, #203a43);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 83, 100, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 16px;
            font-size: 14px;
            min-height: 20px;
        }

        .error {
            color: #e74c3c;
            font-weight: 500;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="icon">🔐</div>
        <h1>Truy Cập Hệ Thống</h1>
        <p>Vui lòng nhập mật khẩu để tiếp tục</p>
        <form id="loginForm">
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required autofocus>
            </div>
            <button type="submit">Đăng Nhập</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const card = document.querySelector('.login-card');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';

            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    // Redirect to the originally requested page or home
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || '/';
                    window.location.href = redirect;
                } else {
                    const text = await response.text();
                    messageDiv.textContent = text;
                    messageDiv.className = 'error';
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 300);
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                messageDiv.textContent = 'Lỗi kết nối!';
                messageDiv.className = 'error';
            }
        });
    </script>
</body>

</html>
